<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Oréal Men Expert Barber Club – Produktinfo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F2E9D8;
    --surface: #FBF6EC;
    --copper: #B5481E;
    --copper-dark: #93371A;
    --ink: #2A1B12;
    --ink-soft: #6B5C4D;
    --charcoal: #1C1A18;
    --gold: #C9A227;
    --line: rgba(42,27,18,0.14);
  }
  * { box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .page{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    padding-bottom: 110px;
    position: relative;
  }

  /* ---------- Begrüßung ---------- */
  .begruessung-box{
    margin: 0 20px 8px;
    background: var(--charcoal);
    border-radius: 12px;
    padding: 18px 20px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .begruessung-icon{
    font-size: 1.5rem;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .begruessung-titel{
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin: 0 0 5px;
  }
  .begruessung-text{
    font-size: 0.84rem;
    line-height: 1.5;
    color: #D9CFC0;
    margin: 0;
  }
  .begruessung-text .chat-link{
    color: var(--gold);
    font-weight: 700;
    cursor: pointer;
    text-decoration: underline dotted;
  }

  /* ---------- Kopfbereich ---------- */
  .top{
    text-align:center;
    padding: 22px 20px 14px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
  }
  .top-rule{
    width: 42px; height: 2px;
    background: var(--gold);
    margin: 10px auto 0;
  }

  /* ---------- Beide Flaschen ---------- */
  .flaschen-row{
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 18px;
    padding: 18px 24px 34px;
    position: relative;
  }
  .flasche-wrap{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .flasche-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .flasche-wrap img{
    height: 230px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 12px 16px rgba(28,26,24,0.18));
  }
  .price-tag{
    position: absolute;
    bottom: 16px;
    right: 28px;
    background: var(--surface);
    border: 1.5px solid var(--ink);
    border-radius: 5px;
    padding: 12px 14px 8px;
    transform: rotate(-7deg);
    box-shadow: 5px 6px 0 rgba(42,27,18,0.16);
    min-width: 84px;
    text-align: center;
  }
  .price-tag::before{
    content:"";
    position: absolute;
    top:-7px; left:50%;
    transform: translateX(-50%);
    width:13px; height:13px;
    border-radius:50%;
    background: var(--bg);
    border: 1.5px solid var(--ink);
  }
  .price-tag .preis{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size: 1.25rem;
    color: var(--copper);
    line-height:1;
  }
  .price-tag .menge{
    font-family:'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  /* ---------- Info-Bilder (2er Raster) ---------- */
  .info-bilder{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 20px 28px;
  }
  .info-bilder img{
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }

  /* ---------- Produkttexte ---------- */
  .info{ padding: 0 24px; }
  .produktname{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    line-height:1.15;
    margin: 0 0 4px;
  }
  .produkttyp{
    font-family:'Oswald', sans-serif;
    font-weight:500;
    color: var(--copper);
    font-size: 1rem;
    margin: 0 0 12px;
  }
  .kurzbeschreibung{
    color: var(--ink-soft);
    font-size: 0.96rem;
    line-height:1.5;
    margin: 0 0 26px;
  }

  /* ---------- X3 Wirkung ---------- */
  .section-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--copper);
    margin: 0 0 12px;
  }
  .wirkungen{
    list-style:none;
    margin: 0 0 28px;
    padding:0;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .wirkungen li{
    border-left: 3px solid var(--gold);
    padding: 2px 0 2px 14px;
  }
  .wirkungen .titel{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .wirkungen .text{
    color: var(--ink-soft);
    font-size: 0.88rem;
    line-height:1.45;
  }
  .beschreibung, .anwendung{
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--ink);
    margin: 0 0 16px;
  }
  .anwendung{
    color: var(--ink-soft);
    font-style: italic;
    margin-bottom: 28px;
  }

  /* ---------- Inhaltsstoffe ---------- */
  .inhaltsstoffe-text{
    font-size: 0.9rem;
    line-height: 2;
    color: var(--ink-soft);
    margin: 0 0 34px;
  }
  .ingredient{
    color: var(--ink);
    text-decoration: underline dotted var(--copper);
    text-decoration-thickness: 1px;
    cursor: pointer;
    font-weight: 600;
    padding: 2px 0;
  }
  .ingredient:hover{ color: var(--copper); }
  .dot{ color: var(--gold); margin: 0 2px; }

  /* ---------- Bewertungen ---------- */
  .bewertungen-section{
    padding: 0 0 32px;
  }
  .bewertungen-header{
    padding: 0 24px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .bewertungen-header .section-label{ margin:0; }
  .gesamt-sterne{
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sterne-gross{
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .gesamt-zahl{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
  .bewertungen-scroll{
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding: 4px 24px 10px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-snap-type: x mandatory;
  }
  .bewertungen-scroll::-webkit-scrollbar{ display: none; }
  .bewertung-card{
    min-width: 220px;
    max-width: 220px;
    background: var(--surface);
    border-radius: 12px;
    padding: 16px;
    flex-shrink: 0;
    scroll-snap-align: start;
    border: 1px solid var(--line);
  }
  .bew-sterne{ font-size: 0.95rem; color: var(--gold); margin-bottom: 6px; }
  .bew-name{
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 2px;
  }
  .bew-datum{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .bew-text{
    font-size: 0.86rem;
    line-height: 1.45;
    color: var(--ink-soft);
  }
  .scroll-hint{
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    opacity: 0.6;
    padding: 4px 0 0;
  }

  /* ---------- Kontakt ---------- */
  .kontakt-box{
    margin: 0 24px 30px;
    padding: 22px 22px 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .kontakt-name{
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .kontakt-zeile{
    font-size: 0.86rem;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .kontakt-label{
    color: var(--ink);
    font-weight: 600;
  }
  .kontakt-trenner{
    height: 1px;
    background: var(--line);
    margin: 12px 0 10px;
  }
  .kontakt-link{
    color: var(--copper);
    text-decoration: none;
    font-weight: 600;
  }
  .kontakt-link:hover{ text-decoration: underline; }

  /* ---------- Fußzeile ---------- */
  .fusszeile{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    opacity:0.7;
    padding: 6px 20px 26px;
  }

  /* ---------- Overlay / Bottom Sheets ---------- */
  .overlay{
    position: fixed; inset: 0;
    background: rgba(28,26,24,0.42);
    opacity:0; pointer-events:none;
    transition: opacity 0.2s ease;
    z-index: 40;
  }
  .overlay.aktiv{ opacity:1; pointer-events:auto; }
  .sheet{
    position: fixed;
    left: 50%; bottom: 0;
    transform: translate(-50%, 110%);
    width: 100%; max-width: 480px;
    background: var(--charcoal);
    color: var(--bg);
    border-radius: 16px 16px 0 0;
    padding: 20px 22px 26px;
    transition: transform 0.25s ease;
    z-index: 50;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
  }
  .sheet.aktiv{ transform: translate(-50%, 0); }
  .sheet-head{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap: 12px; margin-bottom: 10px;
  }
  .sheet-title{
    font-family:'Oswald', sans-serif;
    font-weight:700; font-size: 1.05rem;
    text-transform: uppercase; letter-spacing: 0.02em; margin:0;
  }
  .sheet-close{
    background: rgba(255,255,255,0.1); border:none; color: var(--bg);
    width: 28px; height:28px; border-radius:50%;
    cursor:pointer; font-size: 1rem; flex-shrink:0;
  }
  .sheet-text{
    font-size: 0.9rem; line-height:1.55; color: #D9CFC0; margin:0;
  }

  /* ---------- Chat ---------- */
  .chat-fab{
    position: fixed; right: 18px; bottom: 18px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--copper); border: none;
    box-shadow: 0 8px 18px rgba(42,27,18,0.3);
    cursor:pointer; display:flex; align-items:center;
    justify-content:center; z-index: 30;
  }
  .chat-fab svg{ width:24px; height:24px; }
  .chat-sheet{ max-height: 78vh; display:flex; flex-direction:column; padding-bottom: 16px; }
  .chat-messages{
    flex:1; overflow-y:auto; display:flex; flex-direction:column;
    gap: 10px; margin: 6px 0 14px; padding-right: 2px;
  }
  .msg{
    max-width: 82%; padding: 9px 13px;
    border-radius: 12px; font-size: 0.88rem; line-height:1.4;
  }
  .msg.bot{
    background: rgba(255,255,255,0.08); color: var(--bg);
    align-self:flex-start; border-bottom-left-radius: 3px;
  }
  .msg.user{
    background: var(--copper); color:#fff;
    align-self:flex-end; border-bottom-right-radius: 3px;
  }
  .chat-input-row{ display:flex; gap: 8px; }
  .chat-input-row input{
    flex:1; border: none; border-radius: 20px; padding: 11px 15px;
    font-family:'Source Sans 3', sans-serif; font-size: 0.9rem;
    background: rgba(255,255,255,0.1); color: var(--bg);
  }
  .chat-input-row input::placeholder{ color: #B8AC9C; }
  .chat-input-row input:focus{ outline: 1.5px solid var(--gold); }
  .chat-send{
    border:none; border-radius:50%; width: 42px; height:42px;
    background: var(--gold); color: var(--charcoal);
    cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .chat-send svg{ width:18px; height:18px; }
</style>
</head>
<body>
<div class="page">

  <div class="top">
    <div class="eyebrow" id="eyebrow"></div>
    <div class="top-rule"></div>
  </div>

  <!-- Begrüßungsbox -->
  <div class="begruessung-box">
    <div class="begruessung-icon">👋</div>
    <div>
      <div class="begruessung-titel" id="begruessung"></div>
      <p class="begruessung-text" id="begruessungUntertext"></p>
    </div>
  </div>

  <!-- Zwei Flaschen -->
  <div class="flaschen-row">
    <div class="flasche-wrap">
      <img src="produktbild.jpg" alt="Vorderseite">
      <div class="flasche-label">Vorderseite</div>
    </div>
    <div class="flasche-wrap">
      <img src="produktbild_rueckseite.jpg" alt="Rückseite">
      <div class="flasche-label">Rückseite</div>
    </div>
    <div class="price-tag">
      <div class="preis" id="tagPreis"></div>
      <div class="menge" id="tagMenge"></div>
    </div>
  </div>

  <!-- Zwei Info-Bilder darunter -->
  <div class="info-bilder">
    <img src="anwendung.jpg" alt="Anwendungsschritte">
    <img src="weinreben.jpg" alt="Französischer Weinreben-Extrakt">
  </div>

  <!-- Produkttexte -->
  <div class="info" style="margin-top:24px;">
    <h1 class="produktname" id="produktname"></h1>
    <div class="produkttyp" id="produkttyp"></div>
    <p class="kurzbeschreibung" id="kurzbeschreibung"></p>

    <div class="section-label">X3 WIRKUNG</div>
    <ul class="wirkungen" id="wirkungen"></ul>

    <p class="beschreibung" id="beschreibung"></p>
    <p class="anwendung" id="anwendung"></p>

    <div class="section-label">INHALTSSTOFFE</div>
    <p class="inhaltsstoffe-text" id="inhaltsstoffe"></p>
  </div>

  <!-- Bewertungen -->
  <div class="bewertungen-section">
    <div class="bewertungen-header">
      <div class="section-label">KUNDENBEWERTUNGEN</div>
      <div class="gesamt-sterne">
        <div class="sterne-gross">★★★★★</div>
        <div class="gesamt-zahl">4,7 / 5</div>
      </div>
    </div>
    <div class="bewertungen-scroll" id="bewertungen"></div>
    <div class="scroll-hint">← WISCHEN →</div>
  </div>

  <!-- Kontakt -->
  <div class="kontakt-box">
    <div class="section-label" style="margin-bottom:14px;">KONTAKT</div>
    <div class="kontakt-name" id="kontaktName"></div>
    <div class="kontakt-zeile" id="kontaktAdresse1"></div>
    <div class="kontakt-zeile" id="kontaktAdresse2"></div>
    <div class="kontakt-zeile" id="kontaktAdresse3"></div>
    <div class="kontakt-trenner"></div>
    <div class="kontakt-zeile"><span class="kontakt-label">Tel.:</span> <span id="kontaktTel"></span></div>
    <div class="kontakt-zeile"><span class="kontakt-label">Fax:</span> <span id="kontaktFax"></span></div>
    <div class="kontakt-zeile"><span class="kontakt-label">E-Mail:</span> <a id="kontaktEmail" class="kontakt-link"></a></div>
  </div>

  <div class="fusszeile" id="fusszeile"></div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- Inhaltsstoff Sheet -->
<div class="sheet" id="ingredientSheet">
  <div class="sheet-head">
    <h3 class="sheet-title" id="ingredientTitle"></h3>
    <button class="sheet-close" id="ingredientClose">✕</button>
  </div>
  <p class="sheet-text" id="ingredientText"></p>
</div>

<!-- Chat Sheet -->
<button class="chat-fab" id="chatFab" aria-label="Kundencenter">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
  </svg>
</button>

<div class="sheet chat-sheet" id="chatSheet">
  <div class="sheet-head">
    <h3 class="sheet-title">Kundencenter-Assistent</h3>
    <button class="sheet-close" id="chatClose">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="Frage eingeben …">
    <button class="chat-send" id="chatSend">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script src="inhalte.js"></script>
<script>
  // Alle Variablen zuerst definieren
  const overlay = document.getElementById('overlay');
  const ingredientSheet = document.getElementById('ingredientSheet');
  const chatSheet = document.getElementById('chatSheet');
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  let chatGeoeffnet = false;

  function fuegeNachrichtHinzu(text, absender){
    const div = document.createElement('div');
    div.className = `msg ${absender}`;
    div.textContent = text;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function schliesseAlleSheets(){
    overlay.classList.remove('aktiv');
    ingredientSheet.classList.remove('aktiv');
    chatSheet.classList.remove('aktiv');
  }

  function oeffneChat(){
    overlay.classList.add('aktiv');
    chatSheet.classList.add('aktiv');
    if (!chatGeoeffnet){
      fuegeNachrichtHinzu(inhalte.chatbotBegruessung, 'bot');
      chatGeoeffnet = true;
    }
  }

  // ---------- Grundtexte ----------
  document.getElementById('eyebrow').textContent = inhalte.eyebrow || '';
  document.getElementById('tagPreis').textContent = inhalte.preis || '';
  document.getElementById('tagMenge').textContent = inhalte.menge || '';
  document.getElementById('produktname').textContent = inhalte.produktname || '';
  document.getElementById('produkttyp').textContent = inhalte.produkttyp || '';
  document.getElementById('kurzbeschreibung').textContent = inhalte.kurzbeschreibung || '';
  document.getElementById('beschreibung').textContent = inhalte.beschreibung || '';
  document.getElementById('anwendung').textContent = inhalte.anwendung || '';
  document.getElementById('fusszeile').textContent = inhalte.fusszeile || '';

  // Kontaktdaten
  if (inhalte.kontakt) {
    document.getElementById('kontaktName').textContent = inhalte.kontakt.name || '';
    document.getElementById('kontaktAdresse1').textContent = inhalte.kontakt.strasse || '';
    document.getElementById('kontaktAdresse2').textContent = inhalte.kontakt.plzOrt || '';
    document.getElementById('kontaktAdresse3').textContent = inhalte.kontakt.land || '';
    document.getElementById('kontaktTel').textContent = inhalte.kontakt.telefon || '';
    document.getElementById('kontaktFax').textContent = inhalte.kontakt.fax || '';
    const emailEl = document.getElementById('kontaktEmail');
    emailEl.textContent = inhalte.kontakt.email || '';
    emailEl.href = 'mailto:' + (inhalte.kontakt.email || '');
  }

  // Begrüßung
  if (inhalte.begruessung) {
    document.getElementById('begruessung').textContent = inhalte.begruessung;
  }
  if (inhalte.begruessungUntertext) {
    const begruessungEl = document.getElementById('begruessungUntertext');
    const begruessungText = inhalte.begruessungUntertext;
    const chatLinkText = "Chat-Assistenten";
    const idx = begruessungText.indexOf(chatLinkText);
    if (idx !== -1) {
      begruessungEl.appendChild(document.createTextNode(begruessungText.substring(0, idx)));
      const link = document.createElement('span');
      link.className = 'chat-link';
      link.textContent = chatLinkText;
      link.addEventListener('click', oeffneChat);
      begruessungEl.appendChild(link);
      begruessungEl.appendChild(document.createTextNode(begruessungText.substring(idx + chatLinkText.length)));
    } else {
      begruessungEl.textContent = begruessungText;
    }
  }

  // X3 Wirkung
  const wirkungenListe = document.getElementById('wirkungen');
  (inhalte.wirkungen || []).forEach(w => {
    const li = document.createElement('li');
    li.innerHTML = `<div class="titel">${w.titel}</div><div class="text">${w.text}</div>`;
    wirkungenListe.appendChild(li);
  });

  // Inhaltsstoffe
  const inhaltsstoffeEl = document.getElementById('inhaltsstoffe');
  (inhalte.inhaltsstoffe || []).forEach((stoff, i) => {
    const span = document.createElement('span');
    span.className = 'ingredient';
    span.tabIndex = 0;
    span.textContent = stoff.name;
    span.addEventListener('click', () => {
      document.getElementById('ingredientTitle').textContent = stoff.name;
      document.getElementById('ingredientText').textContent = stoff.beschreibung;
      overlay.classList.add('aktiv');
      ingredientSheet.classList.add('aktiv');
    });
    inhaltsstoffeEl.appendChild(span);
    if (i < inhalte.inhaltsstoffe.length - 1){
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.textContent = ' · ';
      inhaltsstoffeEl.appendChild(dot);
    }
  });

  // Bewertungen
  const bewertungenEl = document.getElementById('bewertungen');
  (inhalte.bewertungen || []).forEach(b => {
    const card = document.createElement('div');
    card.className = 'bewertung-card';
    const sterne = '★'.repeat(b.sterne) + '☆'.repeat(5 - b.sterne);
    card.innerHTML = `
      <div class="bew-sterne">${sterne}</div>
      <div class="bew-name">${b.name}</div>
      <div class="bew-datum">${b.datum}</div>
      <div class="bew-text">${b.text}</div>`;
    bewertungenEl.appendChild(card);
  });

  // ---------- Sheets ----------
  overlay.addEventListener('click', schliesseAlleSheets);
  document.getElementById('ingredientClose').addEventListener('click', schliesseAlleSheets);

  // ---------- Chatbot ----------
  document.getElementById('chatFab').addEventListener('click', oeffneChat);
  document.getElementById('chatClose').addEventListener('click', schliesseAlleSheets);

  function chatbotAntwortFinden(frage){
    const f = frage.toLowerCase();
    const treffer = (inhalte.chatbotAntworten || []).find(e => e.schluesselwoerter.some(w => f.includes(w)));
    return treffer ? treffer.antwort : (inhalte.chatbotStandardantwort || '');
  }

  function nachrichtSenden(){
    const text = chatInput.value.trim();
    if (!text) return;
    fuegeNachrichtHinzu(text, 'user');
    chatInput.value = '';
    setTimeout(() => fuegeNachrichtHinzu(chatbotAntwortFinden(text), 'bot'), 450);
  }

  document.getElementById('chatSend').addEventListener('click', nachrichtSenden);
  chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') nachrichtSenden(); });
</script>
</body>
</html>
